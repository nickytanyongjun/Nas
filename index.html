<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Cloud NAS</title>
    <style>
        :root {
            --bg-primary: #fafafa;
            --bg-surface: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --border: #e5e7eb;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --radius: 8px;
            --transition: all 0.2s ease;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            background: var(--bg-primary); 
            color: var(--text-primary);
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
            min-height: 100vh; 
            align-items: flex-start; 
        }

        #app { 
            width: 100%; 
            max-width: 1200px; 
            background: var(--bg-surface); 
            border-radius: var(--radius); 
            border: 1px solid var(--border);
            padding: 32px; 
            margin-top: 20px;
        }
        
        .nas-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .nas-brand svg {
            width: 32px;
            height: 32px;
            color: var(--text-primary);
        }
        .nas-brand span {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        #login-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 400px; 
            max-width: 320px;
            margin: 0 auto;
        }
        #login-screen input { 
            width: 100%; 
            padding: 12px 14px; 
            margin: 6px 0; 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            font-size: 14px; 
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
        }
        #login-screen input:focus {
            outline: none;
            border-color: var(--text-primary);
            background: var(--bg-surface);
        }
        #login-screen button { 
            width: 100%; 
            padding: 12px; 
            background: var(--text-primary); 
            color: white; 
            border: none; 
            border-radius: var(--radius); 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            margin-top: 14px; 
            transition: var(--transition);
        }
        #login-screen button:hover { 
            opacity: 0.9;
        }
        #login-screen .error { 
            color: var(--danger); 
            margin-top: 14px; 
            font-size: 13px;
        }

        #main-ui { display: none; }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            margin-bottom: 24px; 
            gap: 16px; 
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .nav-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex: 1; 
            min-width: 200px; 
        }
        
        #back-btn {
            display: none;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        #back-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }
        #back-btn svg {
            width: 16px;
            height: 16px;
        }

        .breadcrumb { 
            font-size: 14px; 
            font-weight: 500; 
            color: var(--text-primary); 
            background: var(--bg-primary); 
            padding: 8px 14px; 
            border-radius: var(--radius); 
            flex: 1; 
            word-break: break-all; 
            font-family: monospace;
        }
        .actions { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        .actions button { 
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px; 
            background: var(--bg-surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 500; 
            transition: var(--transition);
            white-space: nowrap; 
            color: var(--text-primary);
        }
        .actions button:hover { 
            border-color: var(--text-primary); 
        }
        .actions button svg {
            width: 16px;
            height: 16px;
        }
        .actions button.danger { 
            color: var(--danger); 
            border-color: var(--border); 
        }
        .actions button.danger:hover { 
            background: var(--danger-bg); 
            border-color: var(--danger); 
        }
        .actions button.danger:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            background: none; 
            color: var(--text-secondary); 
            border-color: var(--border); 
        }
        .logout-btn { 
            background: none !important; 
            border: none !important; 
            color: var(--text-secondary) !important; 
            cursor: pointer; 
            font-weight: 500; 
            padding: 8px !important; 
        }
        .logout-btn:hover { 
            color: var(--danger) !important; 
            text-decoration: none; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th { 
            text-align: left; 
            padding: 12px 8px; 
            border-bottom: 1px solid var(--text-primary); 
            color: var(--text-secondary); 
            font-size: 13px;
            font-weight: 500; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { 
            padding: 14px 8px; 
            border-bottom: 1px solid var(--border); 
            vertical-align: middle; 
            font-size: 14px;
        }
        tr:hover td { background: var(--bg-primary); }
        .file-icon { 
            display: inline-flex;
            align-items: center;
            margin-right: 10px; 
        }
        .file-icon svg {
            width: 18px;
            height: 18px;
        }
        .folder-icon { color: var(--text-primary); }
        .file-item { color: var(--text-primary); cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .file-item:hover { opacity: 0.7; }
        .actions-cell { display: flex; gap: 8px; }
        .actions-cell button { 
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px; 
            font-size: 12px; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            cursor: pointer; 
            background: var(--bg-surface);
            color: var(--text-primary);
            transition: var(--transition);
        }
        .actions-cell button svg {
            width: 14px;
            height: 14px;
        }
        .btn-download:hover { 
            border-color: var(--text-primary);
        }
        .empty { text-align: center; color: var(--text-secondary); padding: 60px 0; font-size: 14px; }
        .checkbox-col { width: 40px; text-align: center; }
        
        input[type="checkbox"] { 
            width: 15px; 
            height: 15px; 
            cursor: pointer; 
            accent-color: var(--text-primary);
        }
        #select-all { 
            width: 15px; 
            height: 15px; 
            cursor: pointer; 
            accent-color: var(--text-primary);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
            animation: modalFadeIn 0.2s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-box .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
        .modal-box h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            word-break: break-all;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-box .modal-actions button {
            padding: 10px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-surface);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            min-width: 100px;
        }
        .modal-box .modal-actions .btn-primary {
            background: var(--text-primary);
            color: white;
            border-color: var(--text-primary);
        }
        .modal-box .modal-actions .btn-primary:hover {
            opacity: 0.9;
        }
        .modal-box .modal-actions .btn-secondary:hover {
            border-color: var(--text-primary);
        }
    </style>
</head>
<body>
<div id="app">
    <div id="login-screen">
        <div class="nas-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
                <line x1="10" y1="6" x2="14" y2="6"></line>
                <line x1="10" y1="18" x2="14" y2="18"></line>
            </svg>
            <span>Personal NAS</span>
        </div>
        <input type="text" id="login-username" placeholder="Username" value="admin">
        <input type="password" id="login-password" placeholder="Password">
        <button id="login-btn">Login</button>
        <div id="login-error" class="error"></div>
    </div>

    <div id="main-ui">
        <div class="header">
            <div class="nav-group">
                <button id="back-btn" title="Go Back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back
                </button>
                <div class="breadcrumb" id="current-path">D:\</div>
            </div>
            <div class="actions">
                <button id="new-folder-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                    New
                </button>
                <button id="upload-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>
                    Upload
                </button>
                <button id="delete-btn" class="danger" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Delete Selected
                </button>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </div>

        <input type="file" id="file-input" multiple style="display:none;">
        <input type="file" id="folder-input" webkitdirectory multiple style="display:none;">

        <table>
            <thead>
                <tr>
                    <th class="checkbox-col"><input type="checkbox" id="select-all"></th>
                    <th>Name</th>
                    <th style="width:100px;">Size</th>
                    <th style="width:180px;">Modified</th>
                    <th style="width:100px;">Actions</th>
                </tr>
            </thead>
            <tbody id="file-list">
                <tr><td colspan="5" class="empty">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="preview-modal">
    <div class="modal-box">
        <span class="modal-icon">🚫</span>
        <h3>Cannot Preview This File</h3>
        <p id="modal-filename">The file type is not supported by your browser.</p>
        <div class="modal-actions">
            <button class="btn-secondary" id="modal-back-btn">Back</button>
            <button class="btn-primary" id="modal-download-btn">Download</button>
        </div>
    </div>
</div>

<script>
    let currentPath = '';
    let currentItems = [];
    const API_BASE = '';
    let pendingDownloadPath = '';

    function isPreviewable(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const previewable = [
            'jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'svg', 'ico', 
            'pdf', 
            'txt', 'log', 'md', 'json', 'xml', 'csv', 'yaml', 'yml', 'toml',
            'mp4', 'webm', 'mov', 'avi', 'mkv',
            'mp3', 'wav', 'ogg', 'flac', 'aac'
        ];
        return previewable.includes(ext);
    }

    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatDate(timestamp) {
        const d = new Date(timestamp * 1000);
        return d.toLocaleString();
    }

    function showLoginScreen() {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('main-ui').style.display = 'none';
    }

    function showMainUI() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        loadDirectory('');
    }

    async function apiCall(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include' });
        if (res.status === 401) {
            showLoginScreen();
            throw new Error('Unauthorized');
        }
        if (!res.ok) {
            const text = await res.text();
            throw new Error(text || 'API Error');
        }
        return res;
    }

    async function loadDirectory(path) {
        currentPath = path;
        const pathDisplay = path ? `D:\\${path.replace(/\//g, '\\')}` : 'D:\\';
        document.getElementById('current-path').textContent = pathDisplay;

        const backBtn = document.getElementById('back-btn');
        if (!path) {
            backBtn.style.display = 'none';
        } else {
            backBtn.style.display = 'inline-flex';
        }

        const tbody = document.getElementById('file-list');
        tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading...</td></tr>';
        document.getElementById('delete-btn').disabled = true;

        try {
            const res = await apiCall(`/api/list?path=${encodeURIComponent(path)}`);
            currentItems = await res.json();

            if (currentItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">This folder is empty</td></tr>';
                return;
            }

            let html = '';
            for (const item of currentItems) {
                const folderSvg = `<svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`;
                const fileSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`;
                
                const icon = item.is_dir ? folderSvg : fileSvg;
                const iconClass = item.is_dir ? 'folder-icon' : '';
                const size = item.is_dir ? '—' : formatSize(item.size);
                const modified = formatDate(item.modified);

                const clickAction = item.is_dir 
                    ? `onclick="loadDirectory('${item.path}')"` 
                    : `onclick="handleFileClick('${item.path}', '${item.name}')"`;

                html += `<tr>
                    <td class="checkbox-col"><input type="checkbox" class="item-checkbox" data-path="${item.path}" onchange="updateDeleteButton()"></td>
                    <td><span class="file-item ${iconClass}" ${clickAction}><span class="file-icon">${icon}</span> ${item.name}</span></td>
                    <td>${size}</td>
                    <td>${modified}</td>
                    <td class="actions-cell">
                        <button class="btn-download" onclick="downloadFile('${item.path}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download
                        </button>
                    </td>
                </tr>`;
            }
            tbody.innerHTML = html;
            document.getElementById('select-all').checked = false;
            updateDeleteButton();
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" class="empty">Error loading: ${e.message}</td></tr>`;
        }
    }

    function goBack() {
        if (!currentPath) {
            alert('You are already at the root (D:\)');
            return;
        }
        const parts = currentPath.split('/');
        parts.pop();
        const parentPath = parts.join('/');
        loadDirectory(parentPath);
    }
    document.getElementById('back-btn').addEventListener('click', goBack);

    function updateDeleteButton() {
        const checkboxes = document.querySelectorAll('.item-checkbox:checked');
        const deleteBtn = document.getElementById('delete-btn');
        const count = checkboxes.length;
        
        deleteBtn.innerHTML = count > 0 
            ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg> Delete Selected (${count})` 
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg> Delete Selected`;
        deleteBtn.disabled = count === 0;
    }

    async function deleteSelected() {
        const checkboxes = document.querySelectorAll('.item-checkbox:checked');
        if (checkboxes.length === 0) return;

        const paths = Array.from(checkboxes).map(cb => cb.dataset.path);
        if (!confirm(`Permanently delete ${paths.length} item(s)?`)) return;

        let failed = [];
        let succeeded = 0;
        for (const path of paths) {
            try {
                await apiCall(`/api/delete?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
                succeeded++;
            } catch (e) {
                failed.push(path);
            }
        }
        alert(`Deleted ${succeeded} item(s). ${failed.length > 0 ? 'Failed: ' + failed.join(', ') : ''}`);
        loadDirectory(currentPath);
    }
    document.getElementById('delete-btn').addEventListener('click', deleteSelected);

    document.getElementById('select-all').addEventListener('change', function() {
        document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = this.checked);
        updateDeleteButton();
    });

    function handleFileClick(path, filename) {
        if (isPreviewable(filename)) {
            window.open(`/api/download?path=${encodeURIComponent(path)}&disposition=inline`, '_blank');
        } else {
            pendingDownloadPath = path;
            document.getElementById('modal-filename').textContent = `"${filename}" cannot be previewed in your browser.`;
            document.getElementById('preview-modal').classList.add('active');
        }
    }

    function downloadFile(path) {
        window.open(`/api/download?path=${encodeURIComponent(path)}&disposition=attachment`, '_blank');
    }

    function closeModal() {
        document.getElementById('preview-modal').classList.remove('active');
        pendingDownloadPath = '';
    }

    document.getElementById('modal-back-btn').addEventListener('click', closeModal);
    document.getElementById('preview-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.getElementById('modal-download-btn').addEventListener('click', function() {
        if (pendingDownloadPath) {
            downloadFile(pendingDownloadPath);
            closeModal();
        }
    });

    // --- UPLOAD LOGIC (FIXED: path appended to URL) ---
    async function uploadFiles(fileList, targetPath) {
        if (fileList.length === 0) return;
        const formData = new FormData();
        for (const file of fileList) {
            formData.append('files', file);
        }

        try {
            const res = await apiCall(`/api/upload?path=${encodeURIComponent(targetPath)}`, {
                method: 'POST',
                body: formData
            });
            const result = await res.json();
            alert(`Uploaded ${result.uploaded.length} items successfully!`);
            loadDirectory(currentPath);
            return true;
        } catch (e) {
            alert('Upload failed: ' + e.message);
            return false;
        }
    }

    document.getElementById('upload-btn').addEventListener('click', function() {
        document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', async function(e) {
        const files = e.target.files;
        if (files.length > 0) {
            const success = await uploadFiles(files, currentPath);
            if (success) {
                if (confirm('Upload a folder as well?')) {
                    document.getElementById('folder-input').click();
                }
            }
        }
        e.target.value = '';
    });

    document.getElementById('folder-input').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            uploadFiles(e.target.files, currentPath);
        }
        e.target.value = '';
    });

    // --- NEW FOLDER LOGIC (FIXED: path appended to URL) ---
    async function createFolder() {
        const name = prompt('Enter new folder name:');
        if (!name) return;
        if (name.includes('\\') || name.includes('/')) {
            alert('Invalid folder name.');
            return;
        }
        try {
            const formData = new FormData();
            formData.append('folder_name', name);
            await apiCall(`/api/mkdir?path=${encodeURIComponent(currentPath)}`, { 
                method: 'POST', 
                body: formData 
            });
            loadDirectory(currentPath);
        } catch (e) {
            alert('Failed to create folder: ' + e.message);
        }
    }
    document.getElementById('new-folder-btn').addEventListener('click', createFolder);

    document.getElementById('login-btn').addEventListener('click', async () => {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('login-error');
        errorDiv.textContent = '';

        try {
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            const res = await fetch('/login', { method: 'POST', body: formData, credentials: 'include' });
            if (!res.ok) throw new Error('Invalid credentials');
            showMainUI();
        } catch (e) {
            errorDiv.textContent = 'Login failed: ' + e.message;
        }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch('/logout', { method: 'POST', credentials: 'include' });
        showLoginScreen();
    });

    (async function init() {
        try {
            await apiCall('/api/list?path=');
            showMainUI();
        } catch (e) {
            showLoginScreen();
        }
    })();
</script>
</body>
</html>
